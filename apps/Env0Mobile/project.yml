# XcodeGen spec — the reusable, reviewable way to define the Xcode project as
# code (no committed .xcodeproj). On a Mac with Xcode 26:
#   brew install xcodegen && cd apps/Env0Mobile && xcodegen generate && open Env0Mobile.xcodeproj
# The app target depends on the local Env0Kit Swift package (Package.swift in
# this same directory), which is the platform-agnostic core verified on Linux.
name: Env0Mobile
options:
  bundleIdPrefix: ai.benchflow.env0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  Env0Kit:
    path: .

targets:
  Env0Mobile:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: Env0Kit
        product: Env0Kit
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Env0
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # This app is a developer/demo client for the env-0 *mock* services,
        # which run over plain HTTP on localhost / a dev host. ATS is relaxed
        # deliberately for that local-only use; it would not ship to the App
        # Store as-is. See ios-networking guidance on ATS exceptions.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.benchflow.env0.mobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
