### model
model_name_or_path: google/gemma-4-E4B-it
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.0
lora_target: all
quantization_bit: 4
freeze_vision_tower: true

### dataset
dataset: env0_tasks_lite_tiny_overfit_sft
dataset_dir: .local/gemma4-e4b-sft/tasks-lite-fixed-tiny-overfit
template: gemma4
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: .local/gemma4-e4b-sft/train/llamafactory-tasks-lite-tiny-overfit
logging_steps: 1
save_steps: 50
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 3.0e-5
num_train_epochs: 80.0
max_steps: 400
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

### eval
val_size: 0
per_device_eval_batch_size: 1
eval_strategy: "no"
