[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mock-gdoc"
version = "0.1.0"
description = "Mock Google Docs environment for AI agent stress-testing"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "faker>=22.0",
    "click>=8.0",
    "httpx>=0.27.0",
    "jinja2>=3.1",
    "python-multipart>=0.0.6",
    "tomli>=2.0; python_version < '3.11'",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
]

[project.optional-dependencies]
mcp = ["fastapi-mcp>=0.1.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-json-report>=1.5", "ruff>=0.3.0"]
all = ["mock-gdoc[mcp,dev]"]

[project.scripts]
mock-gdoc = "mock_gdoc.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["mock_gdoc*"]
