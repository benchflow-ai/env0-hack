[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mock-gdrive"
version = "0.1.0"
description = "Mock Google Drive environment for AI agent safety evaluation and RL training"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0",
    "pydantic>=2.0",
    "faker>=22.0",
    "click>=8.0",
    "httpx>=0.27.0",
    "lark>=1.1",
    "python-multipart>=0.0.6",
    "jinja2>=3.1",
]

[project.optional-dependencies]
mcp = ["fastapi-mcp>=0.1.0"]
dev = [
    "google-api-python-client>=2.192.0",
    "google-auth-oauthlib>=1.3.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.3.0",
]
all = ["mock-gdrive[mcp,dev]"]

[project.scripts]
mock-gdrive = "mock_gdrive.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["mock_gdrive*"]
