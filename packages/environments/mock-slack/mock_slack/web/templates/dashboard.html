{% extends "base.html" %} {% block content %}
<div
  class="flex-1 flex flex-col items-center justify-center text-center p-8 bg-gray-50 h-full"
>
  {% if message %}
  <div class="text-6xl text-gray-300 mb-6">
    <svg
      class="w-24 h-24 mx-auto"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
      ></path>
    </svg>
  </div>
  <h2 class="text-3xl font-bold text-gray-800 mb-3">{{ message }}</h2>
  <p class="text-gray-500 text-lg max-w-md">
    This view is a placeholder in the Mock Slack environment.
  </p>
  {% else %}
  <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome to Mock Slack</h2>
  <p class="text-gray-600 max-w-md">
    Select a channel from the sidebar to start viewing messages.
  </p>
  {% endif %}
</div>
{% endblock %}
